<style>

<script>
// ── DATA ──────────────────────────────────────────────────────────
var PROPS = [];
var CONTRACTS = [];
var nextPid = 5, nextCid = 4, nextEid = 1;
var EXPENSES = [];       // [{id, name, amount, memo, expType}]
var MONTHLY_RECORDS = []; // [{id, year, month, income, note}]
var nextRid = 1;
var pendingDel = null;
var curTab = "portfolio";
var sheetType = null, sheetEditId = null;

// ── UTILS ─────────────────────────────────────────────────────────
function ge(id) { return document.getElementById(id); }
function fmt(n) { return Math.round(n).toLocaleString("ko-KR"); }
function pname(id) {
  for (var i = 0; i < PROPS.length; i++) { if (PROPS[i].id === id) { return PROPS[i].name; } }
  return "–";
}
function isMultiRoom(p) { return p.type === "다가구원룸"; }
function propRooms(p) {
  // 실제 호실 배열 반환
  if (p.rooms && Array.isArray(p.rooms) && p.rooms.length > 0) { return p.rooms; }
  // 구버전 호환
  var arr = [];
  if (p.totalRooms > 0) { for (var i = 1; i <= p.totalRooms; i++) { arr.push(String(i)); } }
  return arr;
}
function totalRooms(p) { return propRooms(p).length; }
function totalRent(p) {
  if (isMultiRoom(p)) { return (p.rent || 0) * (p.rentedRooms || 0); }
  return p.rent || 0;
}
function pyld(p) {
  var mr = totalRent(p);
  if (!p.price || !mr) { return 0; }
  return parseFloat((mr * 12 / p.price * 100).toFixed(2));
}
function monthlyInterest(p) {
  if (!p.loanAmt || !p.loanRate) { return 0; }
  return Math.round(p.loanAmt * (p.loanRate / 100) / 12);
}
function netYield(p) {
  // 이자 차감 후 / 매입가 기준 수익률
  var mr = totalRent(p);
  var interest = monthlyInterest(p);
  var net = mr - interest;
  if (!p.price || net <= 0) { return 0; }
  return parseFloat((net * 12 / p.price * 100).toFixed(2));
}
function investYield(p) {
  // 실제 투자금(매입가 - 대출금 - 보증금) 기준 수익률
  var mr = totalRent(p);
  if (!mr) { return 0; }
  var invested = investedAmt(p);
  if (invested <= 0) { return 0; }
  // 순수입(이자 차감)으로 계산
  var interest = monthlyInterest(p);
  var netIncome = mr - interest;
  if (netIncome <= 0) { return 0; }
  return parseFloat((netIncome * 12 / invested * 100).toFixed(2));
}
function investedAmt(p) {
  // 실제 투자금 = 매입가 − 대출금 − 보증금
  return Math.max(0, (p.price || 0) - (p.loanAmt || 0) - (p.deposit || 0));
}
function investedBreakdown(p) {
  // 계산식 문자열 반환
  var parts = [fmt(p.price) + "만"];
  if (p.loanAmt) { parts.push("대출 " + fmt(p.loanAmt) + "만"); }
  if (p.deposit) { parts.push("보증금 " + fmt(p.deposit) + "만"); }
  return parts.join(" − ");
}
function sbadge(s) {
  if (s === "임대중") { return "bg"; }
  if (s === "전세") { return "bb"; }
  if (s === "공실") { return "ba"; }
  return "bgr";
}
function semoji(t) {
  if (t === "아파트") { return "🏢"; }
  if (t === "빌라" || t === "빌라/다세대") { return "🏘"; }
  if (t === "오피스텔") { return "🏬"; }
  if (t === "상가") { return "🏪"; }
  if (t === "다가구원룸") { return "🏠"; }
  if (t === "토지") { return "🌿"; }
  return "🏗";
}
function cstatus(end) {
  if (!end) { return {l:"–", c:"bgr"}; }
  var d = Math.floor((new Date(end) - new Date()) / 86400000);
  if (d < 0) { return {l:"만료", c:"br"}; }
  if (d < 60) { return {l:"만료임박", c:"br"}; }
  return {l:"정상", c:"bg"};
}
var COLS = ["#007AFF","#34C759","#FF9500","#FF3B30","#AF52DE","#FF6B35"];
var TAB_TITLES = {portfolio:"포트폴리오", contract:"임대차 계약", auction:"경매 분석", cashflow:"수익 현황", annual:"연간 수익 분석", rentmgr:"월세 관리"};
var TAB_ADD = {portfolio:true, contract:true, auction:false, cashflow:false, annual:false, rentmgr:false};
var PTYPES = ["아파트","빌라/다세대","오피스텔","다가구원룸","상가","토지","기타"];
var PSTATUS = ["임대중","전세","공실","매각"];

// ── STORAGE ───────────────────────────────────────────────────────
function saveData() {
  try {
    var pStr = JSON.stringify(PROPS);
    var cStr = JSON.stringify(CONTRACTS);
    var eStr = JSON.stringify(EXPENSES);
    var rStr = JSON.stringify(MONTHLY_RECORDS);
    localStorage.setItem("bp_props",     pStr);
    localStorage.setItem("bp_contracts", cStr);
    localStorage.setItem("bp_expenses",  eStr);
    localStorage.setItem("bp_records",   rStr);
    localStorage.setItem("bp_pid",  String(nextPid));
    localStorage.setItem("bp_cid",  String(nextCid));
    localStorage.setItem("bp_eid",  String(nextEid));
    localStorage.setItem("bp_rid",  String(nextRid));
    // 저장 직후 검증: 읽어서 길이 확인
    var verify = localStorage.getItem("bp_props");
    if (!verify || verify.length < 2) {
      throw new Error("save verify failed");
    }
  } catch(err) {
    // 저장 실패 시 사용자에게 알림 (용량 초과 등)
    if (err.name === "QuotaExceededError") {
      alert("저장 공간이 부족합니다. 일부 데이터를 삭제해주세요.");
    }
  }
}
function contractDday(endStr) {
  // 종료일까지 남은 기간 문자열 반환 (예: "3개월2일", "D-15")
  if (!endStr) { return null; }
  var now = new Date(); now.setHours(0,0,0,0);
  var end = new Date(endStr); end.setHours(0,0,0,0);
  var diffMs = end - now;
  var diffDays = Math.ceil(diffMs / 86400000);
  if (diffDays < 0) { return { text: "만료", color: "#AEAEB2", urgent: false }; }
  var months = Math.floor(diffDays / 30);
  var days = diffDays % 30;
  var text = months > 0 ? months+"개월"+days+"일" : diffDays+"일";
  var urgent = diffDays <= 60; // 2개월 이내
  var color = urgent ? "#FF3B30" : "#8E8E93";
  return { text: text, color: color, urgent: urgent };
}
function periodicExpenses(propId) {
  // 정기지출만 합산. propId 지정 시 해당 물건 귀속 + 공통만
  var t = 0;
  for (var i = 0; i < EXPENSES.length; i++) {
    var e = EXPENSES[i];
    if (e.expType === "onetime") { continue; }
    if (propId !== undefined) {
      // 해당 물건 귀속 또는 공통(propId=0)만
      if (e.propId && e.propId !== propId) { continue; }
    }
    t += e.amount || 0;
  }
  return t;
}
function onetimeExpenses() {
  // 일회성 지출 합산 → 참고용으로만 표시
  var t = 0;
  for (var i = 0; i < EXPENSES.length; i++) {
    if (EXPENSES[i].expType === "onetime") { t += EXPENSES[i].amount || 0; }
  }
  return t;
}
function totalExpenses(propId) {
  // 정기 + 일회성 모두 반영. propId 지정 시 해당 물건 귀속 + 공통만
  return periodicExpenses(propId) + onetimeExpenses();
}
function loadData() {
  try {
    var p   = localStorage.getItem("bp_props");
    var c   = localStorage.getItem("bp_contracts");
    var e   = localStorage.getItem("bp_expenses");
    var r   = localStorage.getItem("bp_records");
    var pid = localStorage.getItem("bp_pid");
    var cid = localStorage.getItem("bp_cid");
    var eid = localStorage.getItem("bp_eid");
    var rid = localStorage.getItem("bp_rid");
    if (p && p !== "null" && p !== "undefined") {
      var parsed = JSON.parse(p);
      if (Array.isArray(parsed)) { PROPS = parsed; }
    }
    if (c && c !== "null" && c !== "undefined") {
      var parsedC = JSON.parse(c);
      if (Array.isArray(parsedC)) { CONTRACTS = parsedC; }
    }
    if (e && e !== "null" && e !== "undefined") {
      var parsedE = JSON.parse(e);
      if (Array.isArray(parsedE)) { EXPENSES = parsedE; }
    }
    if (r && r !== "null" && r !== "undefined") {
      var parsedR = JSON.parse(r);
      if (Array.isArray(parsedR)) { MONTHLY_RECORDS = parsedR; }
    }
    if (pid && !isNaN(parseInt(pid))) { nextPid = parseInt(pid); }
    if (cid && !isNaN(parseInt(cid))) { nextCid = parseInt(cid); }
    if (eid && !isNaN(parseInt(eid))) { nextEid = parseInt(eid); }
    if (rid && !isNaN(parseInt(rid))) { nextRid = parseInt(rid); }
    // migrate: contract 구버전 필드 보완
    for (var ci = 0; ci < CONTRACTS.length; ci++) {
      if (!CONTRACTS[ci].unit)     { CONTRACTS[ci].unit     = CONTRACTS[ci].tenant || ""; }
      if (!CONTRACTS[ci].phone)    { CONTRACTS[ci].phone    = ""; }
      if (!CONTRACTS[ci].memo)     { CONTRACTS[ci].memo     = ""; }
      if (!CONTRACTS[ci].payments) { CONTRACTS[ci].payments = {}; }
    }
    // migrate: 구버전 데이터에 누락된 필드 추가
    for (var i = 0; i < PROPS.length; i++) {
      if (PROPS[i].totalRooms  === undefined) { PROPS[i].totalRooms  = 0; }
      if (PROPS[i].rentedRooms === undefined) { PROPS[i].rentedRooms = 0; }
      if (PROPS[i].loanAmt     === undefined) { PROPS[i].loanAmt     = 0; }
      if (PROPS[i].loanRate    === undefined) { PROPS[i].loanRate    = 0; }
      // rooms 배열 없으면 totalRooms 기반으로 생성 (단순 1~N 번호)
      if (!PROPS[i].rooms || !Array.isArray(PROPS[i].rooms)) {
        PROPS[i].rooms = [];
        if (PROPS[i].type === "다가구원룸" && PROPS[i].totalRooms > 0) {
          for (var ri = 1; ri <= PROPS[i].totalRooms; ri++) { PROPS[i].rooms.push(String(ri)); }
        }
      }
    }
  } catch(err) {
    // localStorage 파싱 오류 → 기존 데이터 유지 (빈 배열)
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────
var TAB_HISTORY = [];  // 탭 이동 히스토리 스택

function updateBackBtn() {
  var btn = ge("btn-back");
  if (!btn) { return; }
  if (TAB_HISTORY.length > 0) {
    var prevTab = TAB_HISTORY[TAB_HISTORY.length - 1];
    ge("btn-back-label").textContent = TAB_TITLES[prevTab] || "뒤로";
    btn.style.display = "flex";
    // 뒤로가기가 있으면 + 버튼 위치 유지를 위해 오른쪽 여백 확보
    var addBtn = ge("btn-add");
    if (addBtn.style.display === "none") {
      addBtn.style.visibility = "hidden";
      addBtn.style.display = "flex";
    }
  } else {
    btn.style.display = "none";
    ge("btn-back-label").textContent = "뒤로";
  }
}

function goTab(id, pushHistory) {
  // 히스토리 관리: tabbar 직접 클릭 시 히스토리 초기화, goTabFrom 호출 시 쌓기
  if (pushHistory === true) {
    TAB_HISTORY.push(curTab);
    if (TAB_HISTORY.length > 10) { TAB_HISTORY.shift(); }
  } else {
    // 탭바 직접 클릭: 히스토리 초기화
    TAB_HISTORY = [];
  }

  var allTabs = document.querySelectorAll(".ti");
  for (var i = 0; i < allTabs.length; i++) {
    allTabs[i].classList.remove("on");
    var sp = allTabs[i].querySelector(".ti-ic span");
    if (sp) { sp.style.color = ""; }
  }
  var activeTab = document.querySelector('.ti[data-tab="' + id + '"]');
  if (activeTab) {
    activeTab.classList.add("on");
    var sp2 = activeTab.querySelector(".ti-ic span");
    if (sp2) { sp2.style.color = "#fff"; }
  }
  var panels = document.querySelectorAll(".pnl");
  for (var j = 0; j < panels.length; j++) { panels[j].classList.remove("on"); }
  ge("pnl-" + id).classList.add("on");
  // 탭 전환 시 스크롤 맨 위로
  var scrollEl = ge("scroll");
  if (scrollEl) { scrollEl.scrollTop = 0; }
  ge("ptitle").textContent = TAB_TITLES[id] || id;
  curTab = id;
  pendingDel = null;

  // + 버튼 visibility 초기화
  var addBtn = ge("btn-add");
  addBtn.style.visibility = "";
  addBtn.style.display = TAB_ADD[id] ? "flex" : "none";

  updateBackBtn();
  ge("scroll").scrollTop = 0;
  if (id === "portfolio") { renderPortfolio(); }
  if (id === "contract") { renderContracts(); }
  if (id === "cashflow") { renderCashflow(); }
  if (id === "annual") { renderAnnual(); }
  if (id === "rentmgr") { renderRentMgr(); }
}

function goBack() {
  if (TAB_HISTORY.length === 0) { return; }
  var prev = TAB_HISTORY.pop();
  goTab(prev, false);
  // 뒤로가기 후에도 남은 히스토리 표시
  updateBackBtn();
}

// ── RENDER PORTFOLIO ──────────────────────────────────────────────
function renderPortfolio() {
  var tv = 0, tr = 0;
  for (var i = 0; i < PROPS.length; i++) {
    tv += PROPS[i].price;
    tr += totalRent(PROPS[i]);
  }
  var rp = [];
  for (var i = 0; i < PROPS.length; i++) {
    if (totalRent(PROPS[i]) > 0) { rp.push(PROPS[i]); }
  }
  var ay = 0, anyld = 0, aiy = 0;
  if (rp.length) {
    var sum = 0, sumn = 0, sumi = 0;
    for (var i = 0; i < rp.length; i++) {
      sum  += pyld(rp[i]);
      sumn += netYield(rp[i]);
      var iy = investYield(rp[i]);
      if (iy > 0) { sumi += iy; }
    }
    ay    = sum  / rp.length;
    anyld = sumn / rp.length;
    // 투자수익률은 대출 있는 물건만 평균
    var loanProps = rp.filter(function(x){ return (x.loanAmt > 0 || x.deposit > 0) && investYield(x) > 0; });
    aiy = loanProps.length ? loanProps.reduce(function(s,x){ return s + investYield(x); }, 0) / loanProps.length : 0;
  }

  var totalUnits = 0, rentedUnits = 0, totalMI = 0, totalInvested = 0, totalDeposit = 0;
  for (var i = 0; i < PROPS.length; i++) {
    if (isMultiRoom(PROPS[i])) {
      totalUnits += PROPS[i].totalRooms || 0;
      rentedUnits += PROPS[i].rentedRooms || 0;
    }
    totalMI += monthlyInterest(PROPS[i]);
    totalInvested += investedAmt(PROPS[i]);
    totalDeposit += PROPS[i].deposit || 0;
  }

  // 총 부채 = 대출금 합계
  var totalLoanSum = 0;
  for (var li = 0; li < PROPS.length; li++) { totalLoanSum += PROPS[li].loanAmt || 0; }

    '<div class="mc"><div class="mc-l">총 자산</div><div class="mc-v">' + (tv/10000).toFixed(1) + '억</div><div class="mc-s">' + fmt(tv) + '만원</div></div>' +
    '<div class="mc"><div class="mc-l">총 부채</div><div class="mc-v" style="color:#FF3B30;">' + (totalLoanSum >= 10000 ? (totalLoanSum/10000).toFixed(1)+'억' : fmt(totalLoanSum)+'만') + '</div><div class="mc-s">대출 합계</div></div>' +
    '<div class="mc"><div class="mc-l">월 수입</div><div class="mc-v">' + fmt(tr) + '만</div><div class="mc-s">연 ' + fmt(tr*12) + '만원</div></div>' +
    '<div class="mc"><div class="mc-l">월 이자지출</div><div class="mc-v" style="color:#FF3B30;">' + fmt(totalMI) + '만</div><div class="mc-s">연 ' + fmt(totalMI*12) + '만원</div></div>' +
    '<div class="mc"><div class="mc-l">매입가 수익률</div><div class="mc-v">' + (ay ? ay.toFixed(1)+"%" : "–") + '</div><div class="mc-s">이자차감 ' + (anyld ? anyld.toFixed(1)+"%" : "–") + '</div></div>' +
    '<div class="mc"><div class="mc-l">투자금 수익률</div><div class="mc-v" style="color:' + (aiy > ay ? "#007AFF" : "#000") + ';">' + (aiy ? aiy.toFixed(1)+"%" : "–") + '</div><div class="mc-s">투자금 ' + (totalInvested ? (totalInvested/10000).toFixed(1)+'억' : "–") + '</div></div>' +
    '<div class="mc"><div class="mc-l">보증금 합계</div><div class="mc-v" style="color:#5856D6;">' + (totalDeposit >= 10000 ? (totalDeposit/10000).toFixed(1)+'억' : fmt(totalDeposit)+'만') + '</div><div class="mc-s">' + fmt(totalDeposit) + '만원</div></div>' +
    '<div class="mc"><div class="mc-l">보유 물건</div><div class="mc-v">' + PROPS.length + '</div><div class="mc-s">' + (totalUnits ? '방 ' + rentedUnits + '/' + totalUnits + '호' : '임대 ' + rp.length + '건') + '</div></div>';

  if (!PROPS.length) {
    ge("plist").innerHTML = '<div class="emp"><div class="emp-i">🏠</div><p>오른쪽 위 <strong style="color:#007AFF;">+</strong> 버튼으로<br>첫 번째 물건을 추가하세요<br><span style="font-size:12px;color:#AEAEB2;margin-top:6px;display:block;">입력한 데이터는 이 기기에 자동 저장됩니다</span></p></div>';

        lb.appendChild(loanTag);
      }
      // 실투자금 (대출 or 보증금 있을 때)
      var ivAmt = investedAmt(p);
      if ((p.loanAmt > 0 || p.deposit > 0) && ivAmt < p.price) {
        var ivTag = document.createElement("div");
        ivTag.style.cssText = "font-size:11px;color:#007AFF;margin-top:2px;font-weight:500;";
        var rentInfo = totalRent(p) > 0 ? " · 월세 " + fmt(totalRent(p)) + "만" : "";
        ivTag.textContent = "실투자금 " + (ivAmt >= 10000 ? (ivAmt/10000).toFixed(1)+"억" : fmt(ivAmt)+"만") + rentInfo;
        lb.appendChild(ivTag);
        var ivFormula = document.createElement("div");
        ivFormula.style.cssText = "font-size:10px;color:#AEAEB2;margin-top:1px;";
        // 보증금 부분 강조: innerHTML로 보증금만 색 다르게
        var bd = investedBreakdown(p);
        if (p.deposit) {
          var depStr = "보증금 " + fmt(p.deposit) + "만";
          bd = bd.replace(depStr, '<span style="color:#5856D6;font-weight:600;">' + depStr + '</span>');
        }
        ivFormula.innerHTML = bd;
        lb.appendChild(ivFormula);
      }

      if (isMultiRoom(p)) {
        var rtag = document.createElement("span");
        rtag.className = "room-tag";
        rtag.textContent = (p.rentedRooms || 0) + "/" + (p.totalRooms || 0) + "호 임대중";
        lb.appendChild(rtag);
      }

      // right value: 매입가수익률 + 투자금수익률
      var iy = investYield(p);
      var invested = investedAmt(p);
      var lv = document.createElement("div"); lv.className = "lv";
      var lv1 = document.createElement("div"); lv1.className = "lv1"; lv1.style.color = col; lv1.textContent = yldStr;
      lv.appendChild(lv1);
      // 투자금이 매입가보다 적을 때만 표시 (대출 또는 보증금 있을 때)
      var hasFunding = (p.loanAmt > 0 || p.deposit > 0);
      if (hasFunding && tr2 && invested < p.price) {
        // 투자금 표시
        var lv1b = document.createElement("div");
        lv1b.style.cssText = "font-size:10px;color:#8E8E93;margin-top:1px;";
        lv1b.textContent = "투자금 " + (invested >= 10000 ? (invested/10000).toFixed(1)+"억" : fmt(invested)+"만");
        lv.appendChild(lv1b);
        // 투자수익률
        var lv1c = document.createElement("div");
        lv1c.style.cssText = "font-size:12px;margin-top:2px;color:#007AFF;font-weight:700;";
        lv1c.textContent = "→ " + (iy > 0 ? iy.toFixed(1)+"%" : "0%");
        lv.appendChild(lv1c);
      }
      var lv2 = document.createElement("div"); lv2.className = "lv2";
      var bdg = document.createElement("span"); bdg.className = "bdg " + sbadge(p.status); bdg.textContent = p.status;
      lv2.appendChild(bdg); lv.appendChild(lv2);

      row.appendChild(lic); row.appendChild(lb); row.appendChild(lv);
      rows.appendChild(row);

      // action buttons
      var ar = document.createElement("div"); ar.className = "arow";
      var eb = document.createElement("button"); eb.className = "ae"; eb.textContent = "수정";
      (function(pid) { eb.addEventListener("click", function() { openSheet("property", pid); }); })(p.id);
      var db = document.createElement("button"); db.className = "ad"; db.textContent = "삭제";
      (function(pid) { db.addEventListener("click", function() { askDel("prop", pid); }); })(p.id);
      var cfBtn = document.createElement("button");
      cfBtn.style.cssText = "flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:#F2F2F7;color:#6C6C70;";
      cfBtn.textContent = "수익현황";
      cfBtn.addEventListener("click", function() { goTab("cashflow", true); });
      ar.appendChild(eb); ar.appendChild(cfBtn); ar.appendChild(db);
      rows.appendChild(ar);
    }
  }
  ge("plist").innerHTML = "";
  ge("plist").appendChild(rows);

  // yield bars
  var my = 0;
  for (var m = 0; m < PROPS.length; m++) { if (pyld(PROPS[m]) > my) { my = pyld(PROPS[m]); } }
  if (!my) { my = 1; }
  var barsHtml = "";
  for (var n = 0; n < PROPS.length; n++) {
    var pp = PROPS[n];
    var cc = COLS[n % COLS.length];
    var ppRent = totalRent(pp);
    var w = ppRent ? Math.round(pyld(pp)/my*100) : 3;
    var label = pp.name;
    if (isMultiRoom(pp)) { label += " (" + (pp.rentedRooms||0) + "/" + (pp.totalRooms||0) + "호)"; }
    var iypp = investYield(pp);
    var yldLabel = ppRent ? pyld(pp).toFixed(1)+"%" : "공실";
    var hasFundingPP = (pp.loanAmt > 0 || pp.deposit > 0) && investedAmt(pp) < pp.price;
    var iyLabel = (ppRent && hasFundingPP && iypp > 0) ? (" → " + iypp.toFixed(1)+"%") : "";
    var ivAmtPP = investedAmt(pp);
    var ivStr = (hasFundingPP && ppRent) ? (" · 투자금 " + (ivAmtPP>=10000?(ivAmtPP/10000).toFixed(1)+"억":fmt(ivAmtPP)+"만")) : "";
    barsHtml +=
      '<div style="margin-bottom:11px;">' +
      '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;">' +
      '<span style="color:#8E8E93;">' + label + ivStr + '</span>' +
      '<span style="font-weight:600;">' + yldLabel +
        (iyLabel ? '<span style="font-size:11px;color:#007AFF;font-weight:700;">' + iyLabel + '</span>' : '') +
      '</span>' +
      '</div>' +
      '<div class="prog"><div class="pf" style="width:' + w + '%;background:' + (ppRent ? cc : "#AEAEB2") + ';"></div></div>' +
      '</div>';
  }
  ge("ybars").innerHTML = barsHtml;
}

// ── RENDER CONTRACTS ──────────────────────────────────────────────
function renderContracts() {
  var clist = ge("clist"); clist.innerHTML = "";

  if (!PROPS.length && !CONTRACTS.length) {
    clist.innerHTML = '<div class="emp"><div class="emp-i">📋</div><p>오른쪽 위 + 버튼으로<br>계약을 추가하세요</p></div>';
    return;
  }

  // 물건별 그룹핑 + 호실 정렬

  });

  // 호실 이름 순 정렬
  Object.keys(propGroups).forEach(function(pid) {
    propGroups[pid].sort(function(a, b) {
      var ua = (a.unit || a.tenant || "").trim();

  });

  PROPS.forEach(function(p) {
    if (!propGroups[p.id]) { propGroups[p.id] = []; }

    hdrLeft.appendChild(nameEl); hdrLeft.appendChild(metaEl);

    var hdrRight = document.createElement("div"); hdrRight.className = "ct-prop-right";

    if (!contracts.length) {

      emptyRow.textContent = "등록된 계약이 없습니다";

    contracts.forEach(function(c) {
      if (pendingDel && pendingDel.type === "contract" && pendingDel.id === c.id) {

        var dbtns = document.createElement("div"); dbtns.className = "dbtns";
        var dcn = document.createElement("button"); dcn.className = "dcn"; dcn.textContent = "취소";
        dcn.addEventListener("click", cancelDel);
        var dok = document.createElement("button"); dok.className = "dok"; dok.textContent = "삭제";
        dok.addEventListener("click", doDel);
        dbtns.appendChild(dcn); dbtns.appendChild(dok);
        dc.appendChild(dtxt); dc.appendChild(dbtns);
        body.appendChild(dc);
        return;
      }

      var st = cstatus(c.end);
      // 호실 행 (탭하면 상세 펼침)
      var unitRow = document.createElement("div"); unitRow.className = "ct-unit-row";
      var uLeft = document.createElement("div"); uLeft.style.cssText="flex:1;";

      uName.textContent = c.unit || c.tenant;
      var uSub = document.createElement("span"); uSub.className = "ct-unit-sub";
      uSub.textContent = c.type + " · 만료 " + (c.end||"–");
      uName.appendChild(uSub);
      if (c.phone) {
        var ph = document.createElement("a");
        ph.href = "tel:" + c.phone.replace(/[^0-9+]/g,"");
        ph.className = "phone-btn"; ph.innerHTML = "📞 " + c.phone;
        ph.addEventListener("click", function(e){ e.stopPropagation(); });
        uLeft.appendChild(uName); uLeft.appendChild(ph);
      } else {
        uLeft.appendChild(uName);
      }
      var uRight = document.createElement("div"); uRight.className = "ct-unit-right";
      var uAmt = document.createElement("div"); uAmt.style.cssText="font-size:15px;font-weight:600;";
      uAmt.textContent = c.monthly ? fmt(c.monthly)+"만/월" : "전세";
      if (c.deposit) {
        var uDep = document.createElement("div"); uDep.style.cssText="font-size:11px;color:#5856D6;font-weight:500;";
        uDep.textContent = "보증금 "+fmt(c.deposit)+"만";
        uRight.appendChild(uDep);
      }
      var uBdg = document.createElement("span"); uBdg.className = "bdg "+st.c; uBdg.textContent = st.l;
      uRight.appendChild(uAmt);
      uRight.appendChild(uBdg);
      // 납부 내역 버튼 (unitRow 오른쪽)
      var histBtn = document.createElement("div");
      histBtn.style.cssText = "font-size:10px;color:#007AFF;font-weight:600;padding:3px 8px;border:0.5px solid rgba(0,122,255,.3);border-radius:6px;cursor:pointer;white-space:nowrap;margin-left:6px;flex-shrink:0;";
      histBtn.textContent = "내역 ▾";
      unitRow.appendChild(uLeft); unitRow.appendChild(uRight); unitRow.appendChild(histBtn);

      // 상세 - 탭하면 토글
      var detail = document.createElement("div");
      detail.style.cssText = "display:none;background:#FAFAFA;border-top:0.5px solid rgba(0,0,0,.06);";
      var detailOpen = false;

        if (e.target === histBtn || histBtn.contains(e.target)) { return; } // histBtn은 별도 처리

        detail.style.display = detailOpen ? "block" : "none";
      });
      histBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        detailOpen = !detailOpen;
        detail.style.display = detailOpen ? "block" : "none";
        histBtn.textContent = detailOpen ? "내역 ▴" : "내역 ▾";
      });

      if (c.monthly || c.start) {
        var now2 = new Date();
        var startD = c.start ? new Date(c.start) : now2;
        var payDay = startD.getDate();
        var histStart = c.start ? new Date(startD.getFullYear(), startD.getMonth(), 1) : new Date(now2.getFullYear(), now2.getMonth(), 1);
        var cur2 = new Date(histStart);
        var limit = new Date(now2.getFullYear(), now2.getMonth(), 1);
        var months = [];
        while (cur2 <= limit && months.length < 36) {
          months.push({y: cur2.getFullYear(), m: cur2.getMonth()});
          cur2.setMonth(cur2.getMonth() + 1);

        months.reverse();

        // 납부 내역 보기 토글
        var histToggle = document.createElement("div");
        histToggle.style.cssText = "padding:8px 16px;font-size:12px;color:#007AFF;cursor:pointer;font-weight:600;border-top:0.5px solid rgba(0,0,0,.06);text-align:right;";
        histToggle.textContent = "납부 내역 보기 ▾";
        var histBox = document.createElement("div"); histBox.style.display = "none";
        var histOpen = false;
        histToggle.addEventListener("click", function(e) {
          e.stopPropagation();
          histOpen = !histOpen;
          histBox.style.display = histOpen ? "block" : "none";
          histToggle.textContent = histOpen ? "납부 내역 접기 ▴" : "납부 내역 보기 ▾";
        });

        // 집계

        months.forEach(function(mo) {

          var s2 = (c.payments&&c.payments[k2])||"none";
          var dueDate = new Date(mo.y, mo.m, payDay);
          var nowMs = now2.getTime();
          var latedays = Math.floor((nowMs - dueDate.getTime())/86400000);
          if(s2==="paid"||s2==="prepaid"||s2==="early"){paidCnt++;}
          else if(s2==="unpaid"){unpaidCnt++;}
          else if(s2==="none"&&latedays>0){lateCnt++;}
          else{noneCnt++;}
        });
        var sumDiv = document.createElement("div");
        sumDiv.style.cssText="display:flex;gap:10px;padding:6px 16px;background:#F8F8F8;font-size:11px;";
        sumDiv.innerHTML = '<span style="color:#1A7A40;font-weight:600;">정기 '+paidCnt+'</span><span style="color:#FF9500;font-weight:600;">지연 '+lateCnt+'</span><span style="color:#FF3B30;font-weight:600;">미납 '+unpaidCnt+'</span><span style="color:#AEAEB2;">미기록 '+noneCnt+'</span>';
        histBox.appendChild(sumDiv);

        months.forEach(function(mo) {
          var k2 = mo.y+"-"+(mo.m+1);
          var s2 = (c.payments&&c.payments[k2])||"none";
          var dueDate = new Date(mo.y, mo.m, payDay);
          var nowMs = now2.getTime();
          var latedays = Math.floor((nowMs - dueDate.getTime())/86400000);
          var isCurMon = (mo.y===now2.getFullYear()&&mo.m===now2.getMonth());

          // 납부 상태 판정

            statusType="regular"; statusText="정기납부"; statusColor="#1A7A40";

            if(s2==="prepaid"){ statusText="✓선납"; }

            statusType="unpaid";
            statusText="미납"+(latedays>0?" (+"+latedays+"일)":""); statusColor="#FF3B30";
          } else if(latedays>0&&s2==="none"){
            statusType="late";
            statusText="지연 +"+latedays+"일"; statusColor="#FF9500";
          } else {
            statusType="none"; statusText="미기록"; statusColor="#AEAEB2";

          var sbEl = document.createElement("span");
          sbEl.className = "pay-status-badge "+statusType;
          sbEl.textContent = statusText;
          // 탭하면 납부↔미납 토글
          (function(cid3,k3,sbEl2,hrow2) {

              e.stopPropagation();
              for(var ci3=0;ci3<CONTRACTS.length;ci3++){

                if(!CONTRACTS[ci3].payments){CONTRACTS[ci3].payments={};}

                else if(cur3==="unpaid"){next3="none";}
                else{next3="paid";}
                CONTRACTS[ci3].payments[k3]=next3;
                saveData();
                var d3=new Date(parseInt(k3.split("-")[0]),parseInt(k3.split("-")[1])-1,payDay);
                var ld3=Math.floor((now2.getTime()-d3.getTime())/86400000);
                if(next3==="paid"){sbEl2.className="pay-status-badge regular";sbEl2.textContent="정기납부";}
                else if(next3==="unpaid"){sbEl2.className="pay-status-badge unpaid";sbEl2.textContent="미납"+(ld3>0?" (+"+ld3+"일)":"");}
                else if(ld3>0){sbEl2.className="pay-status-badge late";sbEl2.textContent="지연 +"+ld3+"일";}
                else{sbEl2.className="pay-status-badge none";sbEl2.textContent="미기록";}
                // 요약 갱신
                var pc2=0,lc2=0,uc2=0,nc2=0;
                months.forEach(function(m4){var k4=m4.y+"-"+(m4.m+1);var s4=(CONTRACTS[ci3].payments&&CONTRACTS[ci3].payments[k4])||"none";var d4=new Date(m4.y,m4.m,payDay);var ld4=Math.floor((now2.getTime()-d4.getTime())/86400000);if(s4==="paid"||s4==="prepaid"||s4==="early")pc2++;else if(s4==="unpaid")uc2++;else if(s4==="none"&&ld4>0)lc2++;else nc2++;});
                sumDiv.innerHTML='<span style="color:#1A7A40;font-weight:600;">정기 '+pc2+'</span><span style="color:#FF9500;font-weight:600;">지연 '+lc2+'</span><span style="color:#FF3B30;font-weight:600;">미납 '+uc2+'</span><span style="color:#AEAEB2;">미기록 '+nc2+'</span>';
                break;
              }
            });
          })(c.id,k2,sbEl,hrow);
          hrow.appendChild(dateEl); hrow.appendChild(sbEl);
          histBox.appendChild(hrow);
        });
        detail.appendChild(histToggle);
        detail.appendChild(histBox);
      }

      // 메모
      if (c.memo) {
        var memoDiv2 = document.createElement("div"); memoDiv2.className = "memo-row";
        memoDiv2.style.background="#FAFAFA";
        var memoTxt2 = document.createElement("div"); memoTxt2.className = "memo-text";
        memoTxt2.textContent = c.memo;
        memoDiv2.appendChild(memoTxt2);
        detail.appendChild(memoDiv2);
      }

      // 수정/삭제 버튼 (호실 상세 안에)
      var ctAr = document.createElement("div"); ctAr.className = "ct-action-bar";
      var ctEb = document.createElement("button"); ctEb.className = "ct-action-btn ct-edit-btn"; ctEb.textContent = "수정";
      (function(cid){ctEb.addEventListener("click",function(e){e.stopPropagation();openSheet("contract",cid);});})(c.id);
      var ctDb = document.createElement("button"); ctDb.className = "ct-action-btn ct-del-btn"; ctDb.textContent = "삭제";
      (function(cid){ctDb.addEventListener("click",function(e){e.stopPropagation();askDel("contract",cid);});})(c.id);
      ctAr.appendChild(ctEb); ctAr.appendChild(ctDb);
      detail.appendChild(ctAr);

      body.appendChild(unitRow);
      body.appendChild(detail);
    });

    card.appendChild(body);
    clist.appendChild(card);
  });

  if (!clist.children.length) {
    clist.innerHTML = '<div class="emp"><div class="emp-i">📋</div><p>오른쪽 위 + 버튼으로<br>계약을 추가하세요</p></div>';
  }
}

// ── RENDER EXPENSES ──────────────────────────────────────────────
function renderExpenses() {
  var el = ge("exp-list");
  if (!el) { return; }
  var periodic = EXPENSES.filter(function(e) { return e.expType !== "onetime"; });
  var onetime  = EXPENSES.filter(function(e) { return e.expType === "onetime"; });

  if (!EXPENSES.length) {
    el.innerHTML = '<div style="padding:10px 16px 4px;font-size:13px;color:#8E8E93;">등록된 기타지출이 없습니다</div>';
    return;
  }

  var frag = document.createDocumentFragment();

  function makeExpRow(exp) {
    var isOnce = exp.expType === "onetime";
    var row = document.createElement("div"); row.className = "exp-row";
    var badge = document.createElement("span");

    _rmMonth--; if (_rmMonth < 0) { _rmMonth = 11; _rmYear--; }
    renderRentMgr();
  });
  var monthLbl = document.createElement("div"); monthLbl.className = "rm-month-label";
  monthLbl.textContent = _rmYear + "년 " + MONTHS_KR[_rmMonth];
  var nextBtn = document.createElement("button"); nextBtn.className = "rm-nav-btn"; nextBtn.textContent = "▶";
  nextBtn.addEventListener("click", function() {
    _rmMonth++; if (_rmMonth > 11) { _rmMonth = 0; _rmYear++; }
    renderRentMgr();
  });
  nav.appendChild(prevBtn); nav.appendChild(monthLbl); nav.appendChild(nextBtn);

  var monthKey = _rmYear + "-" + (_rmMonth + 1);

  // 임대중인 계약만 표시 (만료 안 된 것, 월세 있는 것)
  var activeContracts = CONTRACTS.filter(function(c) {
    if (!c.monthly) { return false; } // 월세 없는 계약 제외
    if (c.start && new Date(c.start) > new Date(_rmYear, _rmMonth + 1, 0)) { return false; }
    if (c.end && new Date(c.end) < new Date(_rmYear, _rmMonth, 1)) { return false; }
    return true;
  });

  // 요약: 건물별 집계 (공실 포함) - 렌더 후 갱신
  var totalPaid = 0, totalUnpaid = 0, totalAmt = 0;
  var cntPaid = 0, cntUnpaid = 0, cntVacant = 0, cntUnconfirmed = 0;
  var nowMs = new Date();

  // 공실 수 집계 (다가구원룸 기준)
  PROPS.forEach(function(prop) {
    if (!isMultiRoom(prop)) { return; }
    var rooms = propRooms(prop);
    rooms.forEach(function(roomNum) {
      var roomLabel = roomNum + "호";
      var hasContract = activeContracts.some(function(c) {
        if (c.propId !== prop.id) { return false; }
        var uk = (c.unit||"").split(" ")[0];
        return uk===roomNum||uk===roomLabel;
      });
      if (!hasContract) { cntVacant++; }
    });
  });

  activeContracts.forEach(function(c) {
    var s = (c.payments && c.payments[monthKey]) || "none";
    totalAmt += c.monthly || 0;
    var payDay = c.start ? new Date(c.start).getDate() : 1;
    var dueDate = new Date(nowMs.getFullYear(), nowMs.getMonth(), payDay);
    if (s==="paid"||s==="early"||s==="prepaid") {
      cntPaid++; totalPaid += c.monthly || 0;
    } else if (s==="unpaid") {
      cntUnpaid++; totalUnpaid += c.monthly || 0;
    } else if (s==="none" && nowMs > dueDate) {
      cntUnconfirmed++;
    }
  });

  var sumEl = ge("rm-summary");
  function updateSummaryBar() {
    sumEl.innerHTML =
      '<div class="rm-sum-item"><div class="rm-sum-lbl">납부완료 <span style="color:#1A7A40;font-weight:700;">' + cntPaid + '가구</span></div><div class="rm-sum-val" style="color:#1A7A40;">+' + fmt(totalPaid) + '만</div></div>' +
      '<div class="rm-sum-item"><div class="rm-sum-lbl">미납 <span style="color:#B91C1C;font-weight:700;">' + cntUnpaid + '가구</span></div><div class="rm-sum-val" style="color:#B91C1C;">' + (totalUnpaid?"-"+fmt(totalUnpaid):"–") + '만</div></div>' +
      (cntUnconfirmed>0?'<div class="rm-sum-item"><div class="rm-sum-lbl">미확인 <span style="color:#FF9500;font-weight:700;">'+cntUnconfirmed+'가구</span></div><div class="rm-sum-val" style="color:#FF9500;">확인필요</div></div>':'')+
      '<div class="rm-sum-item"><div class="rm-sum-lbl">공실 <span style="color:#AEAEB2;font-weight:700;">' + cntVacant + '호</span></div><div class="rm-sum-val" style="color:#AEAEB2;">0만</div></div>' +
      '<div class="rm-sum-item"><div class="rm-sum-lbl">전체</div><div class="rm-sum-val">' + fmt(totalAmt) + '만</div></div>';
  }
  updateSummaryBar();

  // 물건별 그룹핑
  var listEl = ge("rm-list"); listEl.innerHTML = "";

  if (!activeContracts.length) {
    listEl.innerHTML = '<div class="emp"><div class="emp-i">💰</div><p>이번 달 활성 계약이 없습니다</p></div>';
    return;
  }

  // 물건별로 묶기
  var propMap = {};
  activeContracts.forEach(function(c) {
    var pid = c.propId || 0;
    if (!propMap[pid]) { propMap[pid] = []; }
    propMap[pid].push(c);
  });

  // 물건 순서대로 렌더 (계약 있는 물건만)
  var propOrder = PROPS.map(function(p){ return p.id; });
  propOrder.push(0);

  propOrder.forEach(function(pid) {
    var prop = null;
    for (var pi=0; pi<PROPS.length; pi++) { if (PROPS[pi].id===pid) { prop=PROPS[pi]; break; } }
    var propName = prop ? prop.name : "물건 미지정";

    var contracts = propMap[pid] ? propMap[pid].slice() : [];
    var vacantRows = [];

    // 다가구원룸만 공실 호실 추가
    if (prop && isMultiRoom(prop)) {
      var rooms = propRooms(prop);
      rooms.forEach(function(roomNum) {
        var roomLabel = roomNum + "호";
        var hasContract = false;
        for (var ci=0; ci<contracts.length; ci++) {
          var unitKey = (contracts[ci].unit||"").split(" ")[0];
          if (unitKey === roomNum || unitKey === roomLabel) { hasContract = true; break; }
        }
        if (!hasContract) { vacantRows.push(roomLabel); }
      });
    }

    // 계약도 없고 공실도 없으면 스킵
    if (!contracts.length && !vacantRows.length) { return; }

    // 전세/아파트: 납부 현황 없이 전세 표시만
    var isJeonse = prop && !isMultiRoom(prop) && contracts.length > 0 &&
      contracts.every(function(c){ return !c.monthly || c.monthly===0; });

    // 물건 납부 현황 집계
    var pPaid = 0, pTotal = contracts.length + vacantRows.length;
    contracts.forEach(function(c) {
      var s = (c.payments && c.payments[monthKey]) || "none";
      if (s==="paid"||s==="early"||s==="prepaid") { pPaid++; }
    });
    var statClass, statLabel;
    if (isJeonse) {
      statClass = "partial"; statLabel = "전세";
    } else {
      statClass = pPaid===pTotal ? "all-paid" : pPaid===0 ? "none-paid" : "partial";
      statLabel = pPaid + "/" + pTotal + " 납부" + (vacantRows.length > 0 ? " · 공실 " + vacantRows.length + "호" : "");
      if (pPaid===pTotal && vacantRows.length===0) { statLabel = "전액 납부 ✓"; }
    }

    var card = document.createElement("div"); card.className = "rm-prop-card";

    // 헤더 (탭하면 펼치기/접기)
    var hdr = document.createElement("div"); hdr.className = "rm-prop-hdr";
    var hdrLeft = document.createElement("div"); hdrLeft.style.cssText="display:flex;align-items:center;gap:4px;";
    var title = document.createElement("div"); title.className = "rm-prop-title";
    title.textContent = (prop ? semoji(prop.type) + " " : "") + propName;
    var arrow = document.createElement("span"); arrow.className = "rm-toggle-arrow"; arrow.textContent = "▾";
    hdrLeft.appendChild(title); hdrLeft.appendChild(arrow);
    var stat = document.createElement("div"); stat.className = "rm-prop-stat " + statClass;
    stat.textContent = statLabel;
    hdr.appendChild(hdrLeft); hdr.appendChild(stat);
    card.appendChild(hdr);

    // 호실 목록 (기본: 접힘)
    var body = document.createElement("div"); body.className = "rm-prop-body";
    // 첫 번째 물건은 기본 펼침
    if (listEl.children.length === 0) { body.classList.add("open"); arrow.textContent = "▴"; }

    hdr.addEventListener("click", function() {
      body.classList.toggle("open");
      arrow.textContent = body.classList.contains("open") ? "▴" : "▾";
    });

    // 세입자 행
    contracts.forEach(function(c) {
      var s = (c.payments && c.payments[monthKey]) || "none";
      var row = document.createElement("div"); row.className = "rm-tenant-row";

      // 전세: 납부 현황 없이 이름+전세 표시만
      if (isJeonse) {
        var jtNameEl = document.createElement("div"); jtNameEl.className = "rm-tenant-name";
        jtNameEl.textContent = c.unit || c.tenant;
        var jtBdg = document.createElement("span"); jtBdg.style.cssText="font-size:11px;color:#007AFF;margin-left:6px;font-weight:600;";
        jtBdg.textContent = "전세";
        jtNameEl.appendChild(jtBdg);
        var jtAmt = document.createElement("div"); jtAmt.className = "rm-tenant-amt";
        jtAmt.textContent = c.deposit ? fmt(c.deposit)+"만" : "–";
        row.appendChild(jtNameEl); row.appendChild(jtAmt);
        body.appendChild(row);
        return;
      }

      // 납부일
      var payDay = c.start ? new Date(c.start).getDate() : 1;
      var nameEl = document.createElement("div"); nameEl.className = "rm-tenant-name";
      var ddayInfo = contractDday(c.end);
      var ddayHtml = ddayInfo && ddayInfo.text !== "만료"
        ? '<span style="font-size:10px;font-weight:600;margin-left:6px;color:' + ddayInfo.color + ';">' + ddayInfo.text + '</span>'
        : (ddayInfo ? '<span style="font-size:10px;color:#AEAEB2;margin-left:6px;">만료</span>' : '');
      nameEl.innerHTML = (c.unit || c.tenant) +
        '<span style="font-size:11px;color:#AEAEB2;margin-left:5px;">매월 ' + payDay + '일</span>' + ddayHtml;

      // 전화 링크
      if (c.phone) {
        var ph = document.createElement("a");
        ph.href = "tel:" + c.phone.replace(/[^0-9+]/g,"");
        ph.style.cssText = "font-size:11px;color:#007AFF;text-decoration:none;";
        ph.textContent = "📞";
        nameEl.appendChild(ph);
      }

      var amtEl = document.createElement("div"); amtEl.className = "rm-tenant-amt";
      amtEl.textContent = fmt(c.monthly) + "만";
      // 탭하면 금액 수정 가능
      (function(cid2, aEl) {
        aEl.addEventListener("click", function() {
          if (aEl.querySelector("input")) { return; } // 이미 편집 중
          var contr2 = null;
          for (var ci2=0; ci2<CONTRACTS.length; ci2++) { if (CONTRACTS[ci2].id===cid2) { contr2=CONTRACTS[ci2]; break; } }
          if (!contr2) { return; }
          var inp = document.createElement("input");
          inp.className = "rm-amt-input";
          inp.type = "number"; inp.inputMode = "numeric";
          inp.value = contr2.monthly || 0;
          aEl.textContent = "";
          var suffix = document.createElement("span"); suffix.style.cssText="font-size:11px;color:#007AFF;";suffix.textContent="만";
          aEl.appendChild(inp); aEl.appendChild(suffix);
          inp.focus(); inp.select();
          function applyChange() {
            var newAmt = parseFloat(inp.value) || 0;
            contr2.monthly = newAmt;
            saveData();
            aEl.innerHTML = "";
            aEl.textContent = fmt(newAmt) + "만";
            // 요약 바 갱신
            renderRentMgr();
          }
          inp.addEventListener("blur", applyChange);
          inp.addEventListener("keydown", function(e) { if (e.key==="Enter") { inp.blur(); } });
        });
      })(c.id, amtEl);

      // 납부 상태 버튼 (납부/미납/조기납부)
      var btnWrap = document.createElement("div"); btnWrap.style.cssText="display:flex;gap:4px;";
      var payBtn = document.createElement("button");
      payBtn.className = "rm-pay-btn s-" + s;
      payBtn.textContent = s==="paid"?"✓납부":s==="early"?"⚡조기":s==="prepaid"?"✓선납":s==="unpaid"?"✗미납":"미확인";
      var earlyBtn = document.createElement("button");
      earlyBtn.className = "rm-pay-btn s-early";
      earlyBtn.style.cssText = "font-size:11px;padding:4px 8px;";
      earlyBtn.textContent = "⚡조기";
      btnWrap.appendChild(payBtn); btnWrap.appendChild(earlyBtn);

      (function(cid, mk, btn, earlyBtn2, statEl, hdrStatEl, rowEl) {
        // 조기납부 버튼 - 이후 12월까지 월 선택 팝업
        earlyBtn2.addEventListener("click", function(e) {
          e.stopPropagation();
          var existPicker = rowEl.nextSibling;
          if (existPicker && existPicker.classList && existPicker.classList.contains("rm-early-picker")) {
            existPicker.parentNode.removeChild(existPicker);
            return;
          }
          var picker = document.createElement("div");
          picker.className = "rm-early-picker";
          picker.style.cssText = "background:#E5F0FF;padding:10px 14px;border-top:0.5px solid rgba(0,122,255,.2);";
          var ptitle = document.createElement("div");
          ptitle.style.cssText = "font-size:11px;font-weight:600;color:#007AFF;margin-bottom:8px;";
          ptitle.textContent = "선납할 월 선택 (복수 가능)";
          picker.appendChild(ptitle);
          var pgrid = document.createElement("div");
          pgrid.style.cssText = "display:flex;flex-wrap:wrap;gap:6px;";
          var curYear3 = parseInt(mk.split("-")[0]);
          var curMon3 = parseInt(mk.split("-")[1]) - 1;
          var selectedMonths = [];
          var contr3 = null;
          for (var ci3=0;ci3<CONTRACTS.length;ci3++){ if(CONTRACTS[ci3].id===cid){contr3=CONTRACTS[ci3];break;} }
          for (var fi = curMon3 + 1; fi <= 11; fi++) {
            var fk = curYear3 + "-" + (fi + 1);
            var fLbl = (fi + 1) + "월";
            var fStatus = (contr3 && contr3.payments && contr3.payments[fk]) || "none";
            var mBtn = document.createElement("button");
            mBtn.style.cssText = "padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #007AFF;background:#fff;color:#007AFF;";
            mBtn.textContent = fLbl;
            if (fStatus==="paid"||fStatus==="prepaid"||fStatus==="early") {
              mBtn.style.opacity="0.4"; mBtn.style.cursor="default"; mBtn.disabled=true;
              mBtn.textContent += " ✓";
            } else {
              mBtn.dataset.key = fk;
              mBtn.addEventListener("click", function() {
                var idx2 = selectedMonths.indexOf(this.dataset.key);
                if (idx2 >= 0) {
                  selectedMonths.splice(idx2, 1);
                  this.style.background="#fff"; this.style.color="#007AFF";
                } else {
                  selectedMonths.push(this.dataset.key);
                  this.style.background="#007AFF"; this.style.color="#fff";
                }
                confirmBtn.textContent = selectedMonths.length>0 ? selectedMonths.length+"개월 선납 확인" : "확인";
              });
            }
            pgrid.appendChild(mBtn);
          }
          picker.appendChild(pgrid);
          var confirmBtn = document.createElement("button");
          confirmBtn.style.cssText = "margin-top:8px;width:100%;padding:9px;border-radius:8px;border:none;background:#007AFF;color:#fff;font-size:13px;font-weight:600;cursor:pointer;";
          confirmBtn.textContent = "확인";
          confirmBtn.addEventListener("click", function() {
            for(var ci=0;ci<CONTRACTS.length;ci++){
              if(CONTRACTS[ci].id!==cid){continue;}
              if(!CONTRACTS[ci].payments){CONTRACTS[ci].payments={};}
              CONTRACTS[ci].payments[mk]="early";
              for(var si=0;si<selectedMonths.length;si++){
                CONTRACTS[ci].payments[selectedMonths[si]]="prepaid";
              }
              btn.className="rm-pay-btn s-early"; btn.textContent="⚡조기";
              saveData(); picker.parentNode.removeChild(picker); renderRentMgr();
              break;
            }
          });
          picker.appendChild(confirmBtn);
          rowEl.parentNode.insertBefore(picker, rowEl.nextSibling);
        });
        btn.addEventListener("click", function() {
          for (var ci=0; ci<CONTRACTS.length; ci++) {
            if (CONTRACTS[ci].id !== cid) { continue; }
            if (!CONTRACTS[ci].payments) { CONTRACTS[ci].payments = {}; }
            var cur = CONTRACTS[ci].payments[mk] || "none";
            var next = cur==="none"?"paid":cur==="paid"?"unpaid":cur==="unpaid"?"none":"paid";
            CONTRACTS[ci].payments[mk] = next;
            btn.className = "rm-pay-btn s-" + next;
            btn.textContent = next==="paid"?"✓납부":next==="unpaid"?"✗미납":"미확인";
            saveData(); renderContracts();saveData(); renderContracts();
            saveData();
            // 물건 헤더 통계 업데이트
            var newPaid = 0;
            contracts.forEach(function(c2) {
              var s2 = (CONTRACTS.filter(function(x){return x.id===c2.id;})[0] || c2);
              var st2 = (s2.payments && s2.payments[mk]) || "none";
              if (st2==="paid"||st2==="early"||st2==="prepaid") { newPaid++; }
            });
            var newStatClass = newPaid===pTotal?"all-paid":newPaid===0?"none-paid":"partial";
            hdrStatEl.className = "rm-prop-stat " + newStatClass;
            hdrStatEl.textContent = newPaid===pTotal?"전액 납부 ✓":newPaid+"/"+pTotal+" 납부";
            // 전체 요약 업데이트
            var tp=0,tu=0,tn=0;
            activeContracts.forEach(function(ac){
              var contr = CONTRACTS.filter(function(x){return x.id===ac.id;})[0]||ac;
              var ss=(contr.payments&&contr.payments[mk])||"none";
              if(ss==="paid"||ss==="early"||ss==="prepaid"){tp+=ac.monthly||0;}
              else if(ss==="unpaid"){tu+=ac.monthly||0;}
              else{tn+=ac.monthly||0;}
            });
            var cp2=0,cu2=0,cn2=0;
            activeContracts.forEach(function(ac){
              var contr2=CONTRACTS.filter(function(x){return x.id===ac.id;})[0]||ac;
              var ss2=(contr2.payments&&contr2.payments[mk])||"none";
              if(ss2==="paid"||ss2==="early"||ss2==="prepaid"){cp2++;}
              else if(ss2==="unpaid"){cu2++;}
              else{cn2++;}
            });
            sumEl.innerHTML=
              '<div class="rm-sum-item"><div class="rm-sum-lbl">납부 <span style="color:#1A7A40;font-weight:700;">'+cp2+'</span></div><div class="rm-sum-val" style="color:#1A7A40;">+'+fmt(tp)+'만</div></div>'+
              '<div class="rm-sum-item"><div class="rm-sum-lbl">미납 <span style="color:#B91C1C;font-weight:700;">'+cu2+'</span></div><div class="rm-sum-val" style="color:#B91C1C;">'+(tu?"-"+fmt(tu):"–")+'만</div></div>'+
              '<div class="rm-sum-item"><div class="rm-sum-lbl">미확인 <span style="color:#FF9500;font-weight:700;">'+cn2+'</span></div><div class="rm-sum-val" style="color:#FF9500;">?만</div></div>'+
              '<div class="rm-sum-item"><div class="rm-sum-lbl">전체</div><div class="rm-sum-val">'+fmt(totalAmt)+'만</div></div>';
            break;
          }
        });
      })(c.id, monthKey, payBtn, earlyBtn, stat, stat, row);

      row.appendChild(nameEl); row.appendChild(amtEl); row.appendChild(btnWrap);
      body.appendChild(row);
    });

    // 공실 호실 행 추가
    vacantRows.forEach(function(roomLabel) {
      var row = document.createElement("div"); row.className = "rm-tenant-row";
      var nameEl = document.createElement("div"); nameEl.className = "rm-tenant-name";
      nameEl.innerHTML = roomLabel + '<span style="font-size:11px;color:#AEAEB2;margin-left:5px;">공실</span>';
      var amtEl = document.createElement("div"); amtEl.className = "rm-tenant-amt";
      amtEl.style.color = "#AEAEB2";
      amtEl.textContent = "0만";
      var vacBtnWrap = document.createElement("div"); vacBtnWrap.style.cssText="display:flex;gap:4px;";
      var vacBtn = document.createElement("button");
      vacBtn.className = "rm-pay-btn s-none";
      vacBtn.textContent = "공실";
      vacBtn.disabled = true; vacBtn.style.opacity = "0.5";
      var unkBtn = document.createElement("button");
      unkBtn.className = "rm-pay-btn";
      unkBtn.style.cssText = "background:#FFF4E0;color:#7A4D00;font-size:11px;padding:4px 8px;";
      unkBtn.textContent = "미확인";
      vacBtnWrap.appendChild(vacBtn); vacBtnWrap.appendChild(unkBtn);
      row.appendChild(nameEl); row.appendChild(amtEl); row.appendChild(vacBtnWrap);
      body.appendChild(row);
    });

    card.appendChild(body);
    listEl.appendChild(card);
  });
}

// ── RENDER CASHFLOW ───────────────────────────────────────────────
function renderCashflow() {
  var tr = 0, totalLoanInterest = 0;
  for (var i = 0; i < PROPS.length; i++) {
    tr += totalRent(PROPS[i]);
    totalLoanInterest += monthlyInterest(PROPS[i]);
  }
  var ar = tr * 12;
  var loan = totalLoanInterest;
  var otherExp = totalExpenses();
  var est = Math.round(ar * 0.09);
  var op = Math.round(ar * 0.06);
  var netM = tr - loan - otherExp;
  ge("cf-met").innerHTML =
    '<div class="mc"><div class="mc-l">월 수입</div><div class="mc-v" style="color:#34C759;">' + fmt(tr) + '만</div><div class="mc-s">연 ' + fmt(ar) + '만</div></div>' +
    '<div class="mc"><div class="mc-l">월 대출이자</div><div class="mc-v" style="color:#FF3B30;">' + fmt(loan) + '만</div><div class="mc-s">실제 집계</div></div>' +
    '<div class="mc"><div class="mc-l">기타 지출</div><div class="mc-v" style="color:#FF9500;">' + fmt(otherExp) + '만</div><div class="mc-s">연 ' + fmt(otherExp*12) + '만</div></div>' +
    '<div class="mc"><div class="mc-l">월 순수익</div><div class="mc-v" style="color:' + (netM >= 0 ? "#007AFF" : "#FF3B30") + ';">' + (netM >= 0 ? "+" : "") + fmt(netM) + '만</div><div class="mc-s">연 ' + (netM*12 >= 0 ? "+" : "") + fmt(netM*12) + '만</div></div>';
  var items = "";
  for (var k = 0; k < PROPS.length; k++) {
    var p = PROPS[k];
    var tr2 = totalRent(p);
    var nameStr = p.name + (isMultiRoom(p) ? " (" + (p.rentedRooms||0) + "/" + (p.totalRooms||0) + "호)" : "");
    var mi2 = monthlyInterest(p);

    var propPeriodicExp = periodicExpenses(p.id); // 공통 + 귀속 정기지출
    var propOnetimeExp = 0;
    for (var oi = 0; oi < EXPENSES.length; oi++) {
      if (EXPENSES[oi].expType === "onetime" && EXPENSES[oi].propId === p.id) {

  }

  var annNet = netM * 12;

  ge("cf-ann").innerHTML =
    '<div class="rrow"><span class="rk">연간 임대수입</span><span class="rv2" style="color:#34C759;">+' + fmt(ar) + '만원</span></div>' +

    '<div class="rrow" style="background:#E5F0FF;"><span style="font-size:14px;font-weight:700;color:#007AFF;">연간 순이익</span>' +

// ── DELETE ────────────────────────────────────────────────────────
function askDel(type, id) {
  pendingDel = {type:type, id:id};
  if (type === "prop") { renderPortfolio(); } else { renderContracts(); }
}
function cancelDel() {
  pendingDel = null;
  if (curTab === "portfolio") { renderPortfolio(); } else { renderContracts(); }
}
function doDel() {
  if (!pendingDel) { return; }
  if (pendingDel.type === "prop") {
    var newProps = [];
    for (var i = 0; i < PROPS.length; i++) { if (PROPS[i].id !== pendingDel.id) { newProps.push(PROPS[i]); } }
    PROPS = newProps;
  } else {
    var newContracts = [];
    for (var i = 0; i < CONTRACTS.length; i++) { if (CONTRACTS[i].id !== pendingDel.id) { newContracts.push(CONTRACTS[i]); } }
    CONTRACTS = newContracts;
  }
  var t = pendingDel.type;
  var delPropId = (t === "contract" && pendingDel) ? 0 : 0; // already cleared
  pendingDel = null;
  saveData();
  if (t === "prop") { renderPortfolio(); }
  else {
    // 삭제된 계약의 물건도 동기화
    for (var si = 0; si < PROPS.length; si++) { syncPropFromContracts(PROPS[si].id); }
    saveData();
    renderContracts(); renderPortfolio();
  }
}

  var name = ge("f-nm").value.trim();
  var price = parseFloat(ge("f-pr").value) || 0;
  if (!name) { alert("물건명을 입력하세요."); return; }
  if (!price) { alert("시세/매입가를 입력하세요."); return; }
  var ptype = ge("f-ty").value;
  // rooms 배열 수집 (호실 구성기에서)
  var savedRooms = [];
  var gridCells = document.querySelectorAll("#rc-grid .rb-cell.on");
  for (var gi = 0; gi < gridCells.length; gi++) { savedRooms.push(gridCells[gi].dataset.room); }
  var data = {
    name: name,
    type: ptype,
    loc: ge("f-lc").value.trim() || "–",
    price: price,
    // 보증금·월세: 활성 임대계약 합산
    deposit: (function(){ var s=0; CONTRACTS.forEach(function(c){ if(c.propId===sheetEditId && (!c.end||new Date(c.end)>=new Date())){ s+=c.deposit||0; } }); return s; })(),
    rent: (function(){ var s=0; CONTRACTS.forEach(function(c){ if(c.propId===sheetEditId && (!c.end||new Date(c.end)>=new Date())){ s+=c.monthly||0; } }); return s; })(),
    status: ge("f-st").value,
    rooms: ptype === "다가구원룸" ? savedRooms : [],
    totalRooms: ptype === "다가구원룸" ? savedRooms.length : 0,
    rentedRooms: 0,
    loanAmt: parseFloat(ge("f-la").value) || 0,
    loanRate: parseFloat(ge("f-lr").value) || 0
  };
  if (sheetEditId) {
    for (var i = 0; i < PROPS.length; i++) {
      if (PROPS[i].id === sheetEditId) {
        for (var k in data) { PROPS[i][k] = data[k]; }
        break;
      }
    }
  } else {
    data.id = nextPid++;
    PROPS.push(data);
  }
  saveData(); closeSheet(); renderPortfolio();
}

function syncPropFromContracts(propId) {
  // 해당 물건의 유효 계약 기준으로 보증금·월세·임대방 수 자동 합산 동기화
  var prop = null;
  for (var pi = 0; pi < PROPS.length; pi++) { if (PROPS[pi].id === propId) { prop = PROPS[pi]; break; } }
  if (!prop) { return; }
  var active = CONTRACTS.filter(function(c) {
    if (c.propId !== propId) { return false; }
    if (!c.end) { return true; }
    return new Date(c.end) >= new Date();
  });
  if (active.length === 0) {
    prop.status = "공실";
    if (isMultiRoom(prop)) { prop.rentedRooms = 0; }
    return;
  }
  // 전체 보증금·전체 월세: 활성 계약 합산
  var totalDep = 0, totalMon = 0;
  for (var ai = 0; ai < active.length; ai++) {
    totalDep += active[ai].deposit || 0;
    totalMon += active[ai].monthly || 0;
  }
  // 보증금·월세는 사용자가 직접 관리 (자동 덮어쓰기 안 함)
  if (isMultiRoom(prop)) {
    prop.rentedRooms = Math.min(active.length, prop.totalRooms || active.length);
    prop.status = prop.rentedRooms > 0 ? "임대중" : "공실";
  } else {
    prop.status = totalMon > 0 ? "임대중" : (totalDep > 0 ? "전세" : "공실");
  }
}
function saveContract() {
  var unit = ge("f-tu").value.trim();
  if (!unit) { alert("호수/이름을 입력하세요. 예) 203호 임성환"); return; }
  var propId = parseInt(ge("f-pp").value) || 0;
  // 기존 payments 유지 (수정 시)
  var existPayments = {};
  if (sheetEditId) {
    for (var pi3 = 0; pi3 < CONTRACTS.length; pi3++) {
      if (CONTRACTS[pi3].id === sheetEditId && CONTRACTS[pi3].payments) {
        existPayments = CONTRACTS[pi3].payments; break;
      }
    }
  }
  var data = {
    unit: unit,
    tenant: unit,
    propId: propId,
    type: ge("f-ct").value,
    deposit: parseFloat(ge("f-cd").value) || 0,
    monthly: parseFloat(ge("f-cm").value) || 0,
    start: ge("f-cs").value,
    end: ge("f-ce").value,
    phone: (ge("f-ph") ? ge("f-ph").value.trim() : ""),
    memo: (ge("f-mo") ? ge("f-mo").value.trim() : ""),
    payments: existPayments
  };
  if (sheetEditId) {
    for (var i = 0; i < CONTRACTS.length; i++) {
      if (CONTRACTS[i].id === sheetEditId) {
        for (var k in data) { CONTRACTS[i][k] = data[k]; }
        break;
      }
    }
  } else {
    data.id = nextCid++;
    CONTRACTS.push(data);
  }
  // 물건 보증금·월세·임대방 수 자동 동기화
  if (propId) { syncPropFromContracts(propId); }
  saveData(); closeSheet(); renderContracts(); renderPortfolio();
}

// ── CALCULATORS ───────────────────────────────────────────────────
function calcAuction() {
  var ap = parseFloat(ge("a-ap").value) || 0;
  var mn = parseFloat(ge("a-mn").value) || 0;
  var fail = parseInt(ge("a-fl").value) || 0;
  var reg = ge("a-rg").value;
  var rm = {0:0.98,1:0.89,2:0.82,3:0.74,4:0.68};
  var rb = (reg.indexOf("강남") >= 0) ? 0.03 : (reg.indexOf("기타") >= 0) ? 0.01 : 0;
  var avg = (rm[Math.min(fail,4)] || 0.74) + rb;
  var margin = ap * avg - mn;
  ge("ares").innerHTML =
    '<div class="rc"><div class="rl">예상 낙찰가 범위</div>' +
    '<div class="rv">' + fmt(Math.round(ap*(avg-0.05))) + '~' + fmt(Math.round(ap*(avg+0.04))) + '</div>' +
    '<div class="rsub">만원 · 평균 ' + (avg*100).toFixed(1) + '%</div></div>' +
    '<div class="lcard" style="margin-bottom:16px;">' +
    '<div class="rrow"><span class="rk">평균 예상가</span><span class="rv2">' + fmt(Math.round(ap*avg)) + '만원</span></div>' +
    '<div class="rrow"><span class="rk">최저가 대비 여유</span><span class="rv2" style="color:' + (margin>0?"#34C759":"#FF3B30") + ';">' + (margin>0?"+":"") + fmt(Math.round(margin)) + '만원</span></div>' +
    '<div class="rrow"><span class="rk">낙찰가율</span><span class="rv2">' + (avg*100).toFixed(1) + '%</span></div></div>' +
    '<button onclick="goTab(\'portfolio\', true)" style="width:calc(100% - 32px);margin:0 16px 16px;padding:12px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;border:0.5px solid rgba(0,0,0,.15);background:#fff;color:#007AFF;display:block;text-align:center;">← 포트폴리오로 돌아가기</button>';
}
function calcRent() {
  var price = parseFloat(ge("r-pr").value) || 0;
  var dep = parseFloat(ge("r-dp").value) || 0;
  var area = parseFloat(ge("r-ar").value) || 0;
  var type = ge("r-tp").value;
  var reg = ge("r-rg").value;
  var ym = {"아파트":0.038,"빌라/다세대":0.052,"오피스텔":0.055,"다가구원룸":0.060,"상가":0.062};
  var ra = (reg.indexOf("강남") >= 0) ? 0.95 : (reg.indexOf("기타") >= 0) ? 0.98 : 1.02;
  var m = Math.round((price-dep) * (ym[type]||0.045) * ra / 12);
  var j = Math.round(price * (type==="아파트" ? 0.72 : 0.65));
  ge("rres").innerHTML =
    '<div class="rc"><div class="rl">예상 적정 월세 (방당)</div><div class="rv">' + fmt(m) + '만원/월</div>' +
    '<div class="rsub">㎡당 ' + (area?(m/area).toFixed(1):"–") + '만원</div></div>' +
    '<div class="lcard" style="margin-bottom:16px;">' +
    '<div class="rrow"><span class="rk">예상 전세가</span><span class="rv2">' + fmt(j) + '만원</span></div>' +
    '<div class="rrow"><span class="rk">임대 수익률</span><span class="rv2">' + (price?((m*12/price)*100).toFixed(2)+"%":"–") + '</span></div>' +
    '<div class="rrow"><span class="rk">시장가 범위</span><span class="rv2">' + fmt(Math.round(m*0.9)) + '~' + fmt(Math.round(m*1.1)) + '만</span></div></div>' +
    '<button onclick="goTab(\'portfolio\', true)" style="width:calc(100% - 32px);margin:0 16px 16px;padding:12px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;border:0.5px solid rgba(0,0,0,.15);background:#fff;color:#007AFF;display:block;text-align:center;">← 포트폴리오로 돌아가기</button>';
}
function calcLoan() {
  var a = parseFloat(ge("l-am").value) || 0;
  var r = parseFloat(ge("l-rt").value) / 100 / 12;
  var n = parseInt(ge("l-yr").value) * 12;
  var method = ge("l-mt").value;
  var mo, ti;
  if (method === "equal") { mo = a*10000*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1); ti = mo*n-a*10000; }
  else if (method === "principal") { mo = a*10000/n+a*10000*r; ti = a*10000*r*(n+1)/2; }
  else { mo = a*10000*r; ti = mo*n; }
  ge("lres").innerHTML =
    '<div class="rc"><div class="rl">월 납입액</div><div class="rv">' + fmt(Math.round(mo/10000)) + '만원/월</div></div>' +
    '<div class="lcard" style="margin-bottom:16px;">' +
    '<div class="rrow"><span class="rk">총 이자 부담</span><span class="rv2" style="color:#FF3B30;">' + fmt(Math.round(ti/10000)) + '만원</span></div>' +
    '<div class="rrow"><span class="rk">총 상환액</span><span class="rv2">' + fmt(a+Math.round(ti/10000)) + '만원</span></div></div>' +
    '<button onclick="goTab(\'portfolio\', true)" style="width:calc(100% - 32px);margin:0 16px 16px;padding:12px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;border:0.5px solid rgba(0,0,0,.15);background:#fff;color:#007AFF;display:block;text-align:center;">← 포트폴리오로 돌아가기</button>';
}
function calcTaxAcq() {
  var price = parseFloat(ge("tx-p").value) || 0;
  var h = parseInt(ge("tx-h").value);
  var adj = ge("tx-a").value === "y";
  var r = h===1 ? (price<=6000?0.01:price<=9000?0.02:0.03) : h===2 ? (adj?0.08:0.01) : (adj?0.12:0.08);
  var tax = price * r;
  ge("txres").innerHTML =
    '<div class="rc"><div class="rl">취득세 (세율 ' + (r*100).toFixed(0) + '%)</div><div class="rv">' + fmt(Math.round(tax*1.2)) + '만원</div></div>' +
    '<div class="lcard" style="margin-bottom:16px;">' +
    '<div class="rrow"><span class="rk">취득세</span><span class="rv2">' + fmt(Math.round(tax)) + '만원</span></div>' +
    '<div class="rrow"><span class="rk">지방교육세</span><span class="rv2">' + fmt(Math.round(tax*0.2)) + '만원</span></div>' +
    '<div class="rrow"><span class="rk" style="font-weight:700;">합계</span><span class="rv2" style="font-weight:700;">' + fmt(Math.round(tax*1.2)) + '만원</span></div></div>';
}
function calcTransfer() {
  var buy = parseFloat(ge("tr-b").value) || 0;
  var sell = parseFloat(ge("tr-s").value) || 0;
  var cost = parseFloat(ge("tr-c").value) || 0;
  var hold = parseInt(ge("tr-h").value);
  var homes = parseInt(ge("tr-n").value);
  var gain = sell - buy - cost;
  if (homes===1 && hold>=2) { ge("trres").innerHTML='<div class="rc" style="background:#E8F8EF;"><div class="rl" style="color:#1A7A40;">비과세</div><div class="rv" style="color:#1A5C30;font-size:20px;">1세대 1주택 비과세</div></div>'; return; }
  if (gain<=0) { ge("trres").innerHTML='<div class="rc"><div class="rv" style="font-size:18px;">양도차익 없음</div></div>'; return; }
  var taxable = Math.max(0, gain-2500);
  var r = hold<1?0.70:hold<2?0.60:homes>=3?0.60:taxable<=1400?0.06:taxable<=5000?0.15:taxable<=8800?0.24:0.35;
  var tax = Math.round(taxable*r);
  ge("trres").innerHTML =
    '<div class="rc"><div class="rl">양도소득세 (' + (r*100).toFixed(0) + '%) · 지방세 포함</div><div class="rv">' + fmt(Math.round(tax*1.1)) + '만원</div></div>' +
    '<div class="lcard" style="margin-bottom:16px;">' +
    '<div class="rrow"><span class="rk">양도차익</span><span class="rv2">' + fmt(gain) + '만원</span></div>' +
    '<div class="rrow"><span class="rk">기본공제</span><span class="rv2">–2,500만원</span></div>' +
    '<div class="rrow"><span class="rk">과세표준</span><span class="rv2">' + fmt(taxable) + '만원</span></div></div>';
}
function calcIncome() {
  var rent = parseFloat(ge("in-r").value) || 0;
  var method = ge("in-m").value;
  var other = parseFloat(ge("in-o").value) || 0;
  var taxable = Math.max(0, rent*0.4-400);
  if (method === "sep") {
    var tax = Math.round(taxable*0.14);
    ge("inres").innerHTML = '<div class="rc"><div class="rl">분리과세 (14%) · 지방세 포함</div><div class="rv">' + fmt(Math.round(tax*1.1)) + '만원</div></div>';
  } else {
    var r = (taxable+other)<=1400?0.06:(taxable+other)<=5000?0.15:0.24;
    ge("inres").innerHTML = '<div class="rc"><div class="rl">종합과세 (' + (r*100).toFixed(0) + '%)</div><div class="rv">약 ' + fmt(Math.round(taxable*r*1.1)) + '만원</div><div class="rsub">세무사 확인 권장</div></div>';
  }
}

// ── SEGMENTED CONTROLS ────────────────────────────────────────────
function setupSeg(segId, ids) {
  var seg = ge(segId);
  if (!seg) { return; }
  var items = seg.querySelectorAll(".si");
  for (var i = 0; i < items.length; i++) {
    (function(item) {
      item.addEventListener("click", function() {
        for (var j = 0; j < items.length; j++) { items[j].classList.remove("on"); }
        item.classList.add("on");
        var target = item.getAttribute("data-target");
        for (var k = 0; k < ids.length; k++) {
          var s = ge(ids[k]);
          if (s) { s.style.display = (ids[k] === target) ? "block" : "none"; }
        }
      });
    })(items[i]);
  }
}

// ── INIT ──────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", function() {
  loadData();

  ge("btn-add").addEventListener("click", function() {
    if (curTab === "portfolio") { openSheet("property", null); }
    else if (curTab === "contract") { openSheet("contract", null); }
  });
  var btnAddExp = ge("btn-add-exp");
  if (btnAddExp) { btnAddExp.addEventListener("click", function() { openExpenseSheet("periodic"); }); }
  var btnAddExpOnce = ge("btn-add-exp-once");
  if (btnAddExpOnce) { btnAddExpOnce.addEventListener("click", function() { openExpenseSheet("onetime"); }); }
  ge("btn-shclose").addEventListener("click", closeSheet);
  ge("sov").addEventListener("click", function(e) { if (e.target === this) { closeSheet(); } });

  var tabs = document.querySelectorAll(".ti");
  for (var i = 0; i < tabs.length; i++) {
    (function(t) {
      t.addEventListener("click", function() { goTab(t.getAttribute("data-tab"), false); });
    })(tabs[i]);
  }

  var backBtn = ge("btn-back");
  if (backBtn) { backBtn.addEventListener("click", goBack); }

  ge("btn-auction").addEventListener("click", calcAuction);
  ge("btn-rent").addEventListener("click", calcRent);
  ge("btn-loan").addEventListener("click", calcLoan);
  ge("btn-tax").addEventListener("click", calcTaxAcq);
  ge("btn-transfer").addEventListener("click", calcTransfer);
  ge("btn-income").addEventListener("click", calcIncome);

  setupSeg("cseg", ["cc-rent","cc-loan","cc-tax"]);
  setupSeg("tseg", ["tc-acq","tc-trf","tc-inc"]);

  var isStandalone = (window.navigator.standalone === true) ||
    window.matchMedia("(display-mode: standalone)").matches;
  if (!isStandalone) {
    var shown = false;
    try { shown = !!localStorage.getItem("bp_tip"); } catch(e) {}
    if (!shown) {
      setTimeout(function() {
        ge("install-tip").style.display = "block";
        try { localStorage.setItem("bp_tip","1"); } catch(e) {}
      }, 3000);
    }
  }
  ge("btn-tip-close").addEventListener("click", function() {
    ge("install-tip").style.display = "none";
  });

  ge("btn-add").style.display = "flex";
  renderPortfolio();
});

// ── SERVICE WORKER ────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  var swCode = [
    "var C='bpro3';",
    "self.addEventListener('install',function(e){self.skipWaiting();});",
    "self.addEventListener('activate',function(e){",
    "  e.waitUntil(caches.keys().then(function(ks){",
    "    return Promise.all(ks.filter(function(k){return k!==C;}).map(function(k){return caches.delete(k);}));",
    "  }));",
    "  self.clients.claim();",
    "});",
    "self.addEventListener('fetch',function(e){",
    "  if(e.request.method!=='GET'){return;}",
    "  e.respondWith(caches.open(C).then(function(cache){",
    "    return cache.match(e.request).then(function(r){",
    "      var fresh=fetch(e.request).then(function(res){cache.put(e.request,res.clone());return res;});",
    "      return r||fresh;",
    "    });",
    "  }));",
    "});"
  ].join("\n");
  try {
    var blob = new Blob([swCode], {type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});
  } catch(e) {}
}
